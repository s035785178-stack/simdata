name: Android Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK without bumping version
        run: ./gradlew :app:assembleRelease -PskipVersionBump=true

      - name: Read version
        id: version
        run: |
          VERSION_NAME=$(grep VERSION_NAME app/version.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep VERSION_CODE app/version.properties | cut -d'=' -f2)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: גרסה ${{ steps.version.outputs.version_name }}
          body: |
            עדכון חדש זמין להורדה.
            Version Code: ${{ steps.version.outputs.version_code }}
          files: release/app-release.apk
          make_latest: true