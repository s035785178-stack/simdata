name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease -PskipVersionBump=true

      - name: Read version
        id: version
        run: |
          VERSION_NAME=$(grep VERSION_NAME app/version.properties | cut -d'=' -f2 | tr -d '\r')
          VERSION_CODE=$(grep VERSION_CODE app/version.properties | cut -d'=' -f2 | tr -d '\r')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Prepare APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/app-release.apk

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: עדכון זמין
          body: |
            🎉 גרסה חדשה זמינה!

            ✔ שיפורי ביצועים
            ✔ תיקוני תקלות
            ✔ שיפור יציבות האפליקציה

            מומלץ לעדכן לגרסה האחרונה.
          files: release/app-release.apk
          make_latest: true
          overwrite_files: true