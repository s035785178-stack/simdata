import java.util.Properties

apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'com.google.gms.google-services'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("app/keystore.properties")

def hasKeystoreProperties = keystorePropertiesFile.exists()
if (hasKeystoreProperties) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def releaseStoreFilePath = hasKeystoreProperties ? keystoreProperties['storeFile'] : null
def releaseStoreFile = releaseStoreFilePath ? rootProject.file("app/${releaseStoreFilePath}") : null
def hasReleaseKeystore = hasKeystoreProperties && releaseStoreFile != null && releaseStoreFile.exists()

android {
    namespace 'com.stereotip.simdata'
    compileSdk 34

    defaultConfig {
        applicationId "com.stereotip.simdata"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "1.06"
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                storeFile releaseStoreFile
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        debug {
            // לא חותם אם אין keystore
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            }
        }

        release {
            minifyEnabled false
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"

    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.localbroadcastmanager:localbroadcastmanager:1.1.0'

    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-firestore-ktx'

    implementation 'com.google.zxing:core:3.5.3'
}
